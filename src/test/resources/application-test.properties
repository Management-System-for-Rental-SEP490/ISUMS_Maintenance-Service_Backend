spring.datasource.url=jdbc:h2:mem:maintain;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

spring.cache.type=simple
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
spring.kafka.admin.auto-create=false

spring.security.oauth2.resource-server.jwt.jwk-set-uri=http://localhost:9999/test-jwks
keycloak.server-url=http://localhost:9999
keycloak.realm=test
keycloak.client-id=test-client
keycloak.client-secret=test-secret

spring.grpc.server.port=0
spring.grpc.client.channels.house.address=static://localhost:1010
spring.grpc.client.channels.house.negotiation-type=plaintext
spring.grpc.client.channels.user.address=static://localhost:1012
spring.grpc.client.channels.user.negotiation-type=plaintext
spring.grpc.client.channels.issue.address=static://localhost:1016
spring.grpc.client.channels.issue.negotiation-type=plaintext

app.s3.bucket=test-bucket
app.s3.region=ap-southeast-1
app.aws.access-key=test
app.aws.secret-key=test

maintenance.i18n.backfill.enabled=false
management.tracing.enabled=false
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
